<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Constructor Demo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Constructor Function Demo</h1>

      <button id="runBtn">Run Code</button>

      <div class="output" id="output"></div>
    </div>

    <script>
      const output = document.getElementById('output');

      function display(title, value) {
        const block = document.createElement('div');
        block.classList.add('block');

        const h3 = document.createElement('h3');
        h3.textContent = title;

        const p = document.createElement('p');
        p.textContent = value;

        block.appendChild(h3);
        block.appendChild(p);
        output.appendChild(block);
      }

      function clearOutput() {
        output.innerHTML = '';
      }

      // -------- CONSTRUCTOR --------
      function Car(make, model, year, color) {
        this.make = make;
        this.model = model;
        this.year = year;
        this.color = color;

        this.drive = function () {
          display('Drive Method', `You drive the ${this.model}`);
        };
      }

      document.getElementById('runBtn').addEventListener('click', () => {
        clearOutput();

        const car1 = new Car('Ford', 'Mustang', 2024, 'red');
        const car2 = new Car('Chevrolet', 'Camaro', 2025, 'blue');
        const car3 = new Car('Dodge', 'Charger', 2026, 'silver');

        // -------- OUTPUT --------
        display(
          'Car 1',
          `${car1.make} ${car1.model} ${car1.year} ${car1.color}`
        );
        display(
          'Car 2',
          `${car2.make} ${car2.model} ${car2.year} ${car2.color}`
        );
        display(
          'Car 3',
          `${car3.make} ${car3.model} ${car3.year} ${car3.color}`
        );

        car1.drive();
        car2.drive();
        car3.drive();
      });
    </script>
  </body>
</html>
