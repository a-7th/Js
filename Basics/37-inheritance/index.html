<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inheritance</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>JavaScript Inheritance</h1>

      <button onclick="runProgram()">Run Program</button>

      <div id="output"></div>
    </div>

    <script>
      const output = document.getElementById('output');

      function print(text) {
        output.innerHTML += text + '<br>';
      }

      class Animal {
        alive = true;

        eat() {
          print(`This ${this.name} is eating`);
        }

        sleep() {
          print(`This ${this.name} is sleeping`);
        }
      }

      class Rabbit extends Animal {
        name = 'rabbit';

        run() {
          print(`This ${this.name} is running`);
        }
      }

      class Fish extends Animal {
        name = 'fish';

        swim() {
          print(`This ${this.name} is swimming`);
        }
      }

      class Hawk extends Animal {
        name = 'hawk';

        fly() {
          print(`This ${this.name} is flying`);
        }
      }

      function runProgram() {
        // Clear previous output
        output.innerHTML = '';

        const rabbit = new Rabbit();

        print(`Alive: ${rabbit.alive}`);
        rabbit.eat();
        rabbit.sleep();
        rabbit.run();
      }
    </script>
  </body>
</html>
