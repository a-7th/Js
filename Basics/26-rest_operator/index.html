<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Rest Parameters Demo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>JavaScript Rest Parameters (`...rest`)</h1>
      <p class="subtitle">Bundling separate elements into an array</p>

      <hr />

      <div class="card">
        <h2>Example 1: The Fridge (Foods)</h2>
        <div class="output-box">
          <strong>Foods in Fridge:</strong>
          <span id="fridge-output"></span>
        </div>
      </div>

      <div class="card">
        <h2>Example 2: Math Operations (Average)</h2>
        <div class="output-box">
          <strong>Calculated Average:</strong>
          <span id="average-output"></span>
        </div>
      </div>

      <div class="card">
        <h2>Example 3: String Combiner (Full Name)</h2>
        <div class="output-box">
          <strong>Combined Name:</strong>
          <span id="name-output"></span>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
