<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compound Interest Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator-container">
      <h2>Interest Calculator</h2>

      <div class="input-group">
        <label for="principal">Principal Amount ($):</label>
        <input type="number" id="principal" value="0" min="0" />
      </div>

      <div class="input-group">
        <label for="rate">Interest Rate (%):</label>
        <input type="number" id="rate" value="0" min="0" step="0.1" />
      </div>

      <div class="input-group">
        <label for="years">Years:</label>
        <input type="number" id="years" value="0" min="0" />
      </div>

      <button onclick="calculate()">Calculate</button>

      <div class="result-box">
        <h3>Total Amount: <span id="total-amount">$0.00</span></h3>
      </div>
    </div>

    <script src="index.js"></script>
</body>
    <script>
      // You can paste your calculate() function right here if you want it all in one HTML file!
    </script>
  </body>
</html>
