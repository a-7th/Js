<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Getters & Setters</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Getters & Setters Demo</h1>

      <button onclick="runProgram()">Run Program</button>

      <div id="output"></div>
    </div>

    <script>
      const output = document.getElementById('output');

      function print(text) {
        output.innerHTML += text + '<br>';
      }

      // ---------- EXAMPLE 1 ----------
      class Rectangle {
        constructor(width, height) {
          this.width = width;
          this.height = height;
        }

        set width(newWidth) {
          if (newWidth > 0) {
            this._width = newWidth;
          } else {
            print('Width must be a positive number');
          }
        }

        set height(newHeight) {
          if (newHeight > 0) {
            this._height = newHeight;
          } else {
            print('Height must be a positive number');
          }
        }

        get width() {
          return `${this._width.toFixed(1)}cm`;
        }

        get height() {
          return `${this._height.toFixed(1)}cm`;
        }

        get area() {
          return `${(this._width * this._height).toFixed(1)}cm`;
        }
      }

      // ---------- EXAMPLE 2 ----------
      class Person {
        constructor(firstName, lastName, age) {
          this.firstName = firstName;
          this.lastName = lastName;
          this.age = age;
        }

        set firstName(newFirstName) {
          if (typeof newFirstName === 'string' && newFirstName.length > 0) {
            this._firstName = newFirstName;
          } else {
            print('First name must be a non-empty string');
          }
        }

        set lastName(newLastName) {
          if (typeof newLastName === 'string' && newLastName.length > 0) {
            this._lastName = newLastName;
          } else {
            print('Last name must be a non-empty string');
          }
        }

        set age(newAge) {
          if (typeof newAge === 'number' && newAge >= 0) {
            this._age = newAge;
          } else {
            print('Age must be a non-negative number');
          }
        }

        get firstName() {
          return this._firstName;
        }

        get lastName() {
          return this._lastName;
        }

        get fullName() {
          return this._firstName + ' ' + this._lastName;
        }

        get age() {
          return this._age;
        }
      }

      function runProgram() {
        output.innerHTML = '';

        // Rectangle
        const rectangle = new Rectangle(2, 3);

        print('=== RECTANGLE ===');
        print('Width: ' + rectangle.width);
        print('Height: ' + rectangle.height);
        print('Area: ' + rectangle.area);

        print('<br>');

        // Person
        const person = new Person('Spongebob', 'Squarepants', 30);

        print('=== PERSON ===');
        print('First Name: ' + person.firstName);
        print('Last Name: ' + person.lastName);
        print('Full Name: ' + person.fullName);
        print('Age: ' + person.age);
      }
    </script>
  </body>
</html>
