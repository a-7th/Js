<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript For Loop Practice</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <h1>🔄 For Loop Practice</h1>
      <p>Click a button to run the loop and see the output below.</p>

      <div class="button-group">
        <button onclick="runIncrement()">Run Increment (1 to 10)</button>
        <button onclick="runDecrement()" class="btn-decrement">
          Run Decrement (10 to 1)
        </button>
      </div>

      <div class="output-box">
        <h3>Output:</h3>
        <div id="loop-output">Results will appear here...</div>
      </div>
    </div>

    <script>
      // ------- INCREMENT -------
      function runIncrement() {
        let outputDiv = document.getElementById('loop-output');
        outputDiv.innerHTML = ''; // Clear previous output

        for (let i = 1; i <= 10; i++) {
          outputDiv.innerHTML += i + ' ';
        }
      }

      // ------- DECREMENT -------
      function runDecrement() {
        let outputDiv = document.getElementById('loop-output');
        outputDiv.innerHTML = ''; // Clear previous output

        for (let i = 10; i > 0; i--) {
          outputDiv.innerHTML += i + ' ';
        }
      }
    </script>
  </body>
</html>
