import datetime
import json
import os
import uuid
from typing import Dict, List, Optional


class Task:
    """Represents an individual task within the management system."""

    def __init__(
        self,
        title: str,
        description: str,
        category: str,
        priority: int,
        due_date: str,
    ):
        self.id: str = str(uuid.uuid4())[:8]
        self.title: str = title
        self.description: str = description
        self.category: str = category.upper()
        self.priority: int = max(1, min(5, priority))  # Restrict scale to 1-5
        self.created_at: str = datetime.datetime.now().strftime("%Y-%m-%d %H:%M")
        self.due_date: str = due_date
        self.is_completed: bool = False
        self.completed_at: Optional[str] = None

    def mark_complete(self) -> None:
        """Marks the task as completed and records the timestamp."""
        self.is_completed = True
        self.completed_at = datetime.datetime.now().strftime("%Y-%m-%d %H:%M")

    def to_dict(self) -> Dict:
        """Converts the task object into a dictionary for JSON serialization."""
        return self.__dict__

    @classmethod
    def from_dict(cls, data: Dict) -> "Task":
        """Creates a Task instance from a dictionary."""
        task = cls(
            title=data["title"],
            description=data["description"],
            category=data["category"],
            priority=data["priority"],
            due_date=data["due_date"],
        )
        task.id = data["id"]
        task.created_at = data["created_at"]
        task.is_completed = data["is_completed"]
        task.completed_at = data["completed_at"]
        return task


class TaskManager:
    """Handles the business logic of managing tasks, persistence, and analytics."""

    def __init__(self, storage_file: str = "tasks_db.json"):
        self.storage_file: str = storage_file
        self.tasks: List[Task] = []
        self.load_tasks()

    def add_task(
        self, title: str, description: str, category: str, priority: int, due_date: str
    ) -> Task:
        """Creates, appends, and saves a new task."""
        new_task = Task(title, description, category, priority, due_date)
        self.tasks.append(new_task)
        self.save_tasks()
        return new_task

    def delete_task(self, task_id: str) -> bool:
        """Removes a task by its short ID."""
        initial_len = len(self.tasks)
        self.tasks = [t for t in self.tasks if t.id != task_id]
        if len(self.tasks) < initial_len:
            self.save_tasks()
            return True
        return False

    def complete_task(self, task_id: str) -> bool:
        """Finds a task and marks it complete."""
        for task in self.tasks:
            if task.id == task_id:
                task.mark_complete()
                self.save_tasks()
                return True
        return False

    def get_filtered_tasks(self, category: Optional[str] = None, pending_only: bool = False) -> List[Task]:
        """Returns filtered lists of tasks based on criteria."""
        filtered = self.tasks
        if category:
            filtered = [t for t in filtered if t.category == category.upper()]
        if pending_only:
            filtered = [t for t in filtered if not t.is_completed]
        return sorted(filtered, key=lambda x: (-x.priority, x.due_date))

    def save_tasks(self) -> None:
        """Persists current tasks to a JSON file."""
        try:
            with open(self.storage_file, "w") as f:
                json.dump([t.to_dict() for t in self.tasks], f, indent=4)
        except IOError as e:
            print(f"\n[Error] Could not save tasks to file: {e}")

    def load_tasks(self) -> None:
        """Loads tasks from a JSON file, handles missing or corrupt files gracefully."""
        if not os.path.exists(self.storage_file):
            self.tasks = []
            return

        try:
            with open(self.storage_file, "r") as f:
                data = json.load(f)
                self.tasks = [Task.from_dict(item) for item in data]
        except (json.JSONDecodeError, KeyError, IOError):
            print("\n[Warning] Database file corrupt or unreadable. Starting fresh.")
            self.tasks = []

    def generate_dashboard_metrics(self) -> Dict:
        """Computes statistical metrics for dashboard analytics."""
        total = len(self.tasks)
        completed = len([t for t in self.tasks if t.is_completed])
        pending = total - completed
        
        # Category breakdown
        categories: Dict[str, int] = {}
        for t in self.tasks:
            categories[t.category] = categories.get(t.category, 0) + 1

        return {
            "total": total,
            "completed": completed,
            "pending": pending,
            "rate": (completed / total * 100) if total > 0 else 0.0,
            "categories": categories
        }


class TerminalInterface:
    """Manages CLI UI rendering and user interaction."""

    def __init__(self):
        self.manager = TaskManager()

    def clear_screen(self):
        os.system("cls" if os.name == "nt" else "clear")

    def draw_header(self, title: str):
        print("=" * 60)
        print(f" {title.upper()} ".center(60, "■"))
        print("=" * 60)

    def draw_dashboard(self):
        metrics = self.manager.generate_dashboard_metrics()
        self.draw_header("Task Analytics Dashboard")
        
        # Summary row
        print(f" Total Tasks: {metrics['total']}  │  Pending: {metrics['pending']}  │  Completed: {metrics['completed']}")
        
        # Completion Bar Graph
        bar_len = 30
        filled = int((metrics['rate'] / 100) * bar_len) if metrics['total'] > 0 else 0
        bar = "█" * filled + "░" * (bar_len - filled)
        print(f" Progress:    [{bar}] {metrics['rate']:.1f}%")
        print("-" * 60)
        
        # Category breakdown
        if metrics['categories']:
            print(" Task Distribution by Category:")
            for cat, count in metrics['categories'].items():
                dots = "•" * count
                print(f"  {cat:<12} {dots} ({count})")
        else:
            print(" No category metrics available. Add tasks to populate.")
        print("=" * 60)

    def display_tasks_table(self, tasks: List[Task], title: str):
        self.draw_header(title)
        if not tasks:
            print(" No tasks match your selection criteria.".center(60))
            print("=" * 60)
            return

        print(f" {'ID':<10}{'Title':<18}{'Category':<12}{'Priority':<10}{'Due Date':<10}")
        print("-" * 60)
        for t in tasks:
            status_marker = "✓" if t.is_completed else " "
            title_trunc = t.title if len(t.title) <= 15 else t.title[:12] + "..."
            priority_stars = "★" * t.priority
            print(f" [{status_marker}] {t.id:<5} {title_trunc:<18} {t.category:<12} {priority_stars:<10} {t.due_date:<10}")
        print("=" * 60)

    def run(self):
        """Main application lifecycle loop."""
        while True:
            self.clear_screen()
            self.draw_dashboard()
            
            print("\n [1] View Pending Tasks   [2] View All Tasks      [3] Add New Task")
            print(" [4] Complete a Task      [5] Delete a Task       [0] Exit Application")
            
            choice = input("\nSelect an operational directive: ").strip()

            if choice == "1":
                self.clear_screen()
                tasks = self.manager.get_filtered_tasks(pending_only=True)
                self.display_tasks_table(tasks, "Pending Operations")
                input("\nPress Enter to return to main dashboard...")
                
            elif choice == "2":
                self.clear_screen()
                tasks = self.manager.get_filtered_tasks()
                self.display_tasks_table(tasks, "Master Task Registry")
                input("\nPress Enter to return to main dashboard...")

            elif choice == "3":
                self.clear_screen()
                self.draw_header("Provision New Task")
                title = input("Enter Task Title: ").strip()
                desc = input("Enter Description: ").strip()
                cat = input("Enter Category (e.g., Work, Personal, Life): ").strip() or "GENERAL"
                
                try:
                    priority = int(input("Enter Priority Rank (1 - lowest, 5 - highest): ") or 3)
                except ValueError:
                    priority = 3
                    
                due_date = input("Enter Target Completion Date (YYYY-MM-DD): ").strip() or "N/A"
                
                if title:
                    t = self.manager.add_task(title, desc, cat, priority, due_date)
                    print(f"\n[Success] Task successfully instantiated with global ID: {t.id}")
                else:
                    print("\n[Error] Task generation canceled: Title is a mandatory field.")
                input("\nPress Enter to return to main dashboard...")

            elif choice == "4":
                self.clear_screen()
                tasks = self.manager.get_filtered_tasks(pending_only=True)
                self.display_tasks_table(tasks, "Select Task for Completion")
                if tasks:
                    t_id = input("\nEnter target Task ID to process: ").strip()
                    if self.manager.complete_task(t_id):
                        print(f"\n[Success] Status configuration updated for Task {t_id}.")
                    else:
                        print(f"\n[Error] Invalid target ID sequence.")
                else:
                    print(" No tasks available to process.")
                input("\nPress Enter to return to main dashboard...")

            elif choice == "5":
                self.clear_screen()
                tasks = self.manager.get_filtered_tasks()
                self.display_tasks_table(tasks, "Select Task for Purging")
                if tasks:
                    t_id = input("\nEnter target Task ID to purge: ").strip()
                    if self.manager.delete_task(t_id):
                        print(f"\n[Success] Task reference {t_id} dropped from local schema.")
                    else:
                        print(f"\n[Error] Invalid target ID sequence.")
                else:
                    print(" No records present to delete.")
                input("\nPress Enter to return to main dashboard...")

            elif choice == "0":
                self.clear_screen()
                print("\n" + "="*40)
                print(" Shutting down engine components... Goodbye.".center(40))
                print("="*40 + "\n")
                break


if __name__ == "__main__":
    # Standard entrypoint validation
    app = TerminalInterface()
    app.run()
